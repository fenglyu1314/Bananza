schema: spec-driven

context: |
  Project: Bananza — 基于团结引擎（Tuanjie，Unity 中国版分支）的单机游戏项目。
  Engine / Language: Tuanjie Engine + C#，渲染管线 URP。
  Platform: 主攻 PC（Windows），预留移动端可能性。
  Conventions:
    - .meta 文件必须由引擎自动生成，严禁人工或脚本创建。
    - 代码风格遵循仓库根的 .editorconfig（C# 4 空格、LF、UTF-8）。
    - 引擎相关实践沉淀在 Docs/EngineNotes_Tuanjie.md。
    - 团队协作基线见 AGENTS.md；项目愿景与玩法见 README.md。
  Language (执行层摘要；完整规则以 spec 为准):
    - 所有 OpenSpec 产物的自然语言部分默认使用简体中文。
    - OpenSpec 结构骨架（## Purpose / ## Requirements / ### Requirement: / #### Scenario: / WHEN / THEN / AND）与 RFC 2119 关键词（MUST/SHALL/SHOULD/MAY 等）保留英文原文。
    - 代码标识符（类名、方法名、路径、文件名、配置键、CLI 命令、Unity/团结引擎 API、asmdef 名等）保留英文原文，正文提及时用反引号包裹。
    - 权威规则参见 `openspec/specs/documentation-conventions/spec.md`；本段仅为 prompt 注入时的执行层摘要，如与 spec 冲突，以 spec 为准。
  OpenSpec usage:
    - specs/ 存放已稳定的能力规格（capability spec）。
    - changes/ 存放进行中的提案；完成后归档到 changes/archive/。

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

# 以下 rules.* 仅为每类 artifact 的执行层提示；文档语言的完整规范见
# openspec/specs/documentation-conventions/spec.md。
rules:
  proposal:
    - 用中文撰写 Why / What Changes / Impact 各节的正文；节标题保留英文。
  design:
    - 技术决策与权衡说明用中文，代码块、路径、配置片段保留原文。
  tasks:
    - 任务描述用中文祈使句；路径、文件名、符号用反引号包裹英文原文。
  specs:
    - Requirement 标题保留英文，正文与 Scenario 正文用中文；Scenario 使用 4 个 `#`。
